<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Surfly Session</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        #linkInput {
            width: 350px;
            padding: 8px;
            font-size: 14px;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* Styling for the new control buttons */
        .action-btn {
            background-color: #28a745; 
        }
        .action-btn:hover {
            background-color: #218838;
        }
        #surfly-frame {
            width: 100%;
            height: 700px;
            border: 2px solid #ccc;
            border-radius: 4px;
        }
        /* Hide session controls until session starts */
        #sessionControls {
            display: none; 
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>Join Co-Browsing Session</h2>
    
    <div class="controls">
        <input type="text" id="linkInput" placeholder="Paste Surfly follower link here...">
        <button onclick="startSession()">Start in Iframe</button>
    </div>

    <div id="sessionControls">
        <h4>Session Controls</h4>
        <button class="action-btn" onclick="requestHost()">Request to Host</button>
        <button class="action-btn" onclick="requestTab()">Request Tab Control</button>
        <button class="action-btn" onclick="revokeTab()">Revoke Tab Control</button>
        <button class="action-btn" onclick="returnTab()">Return Tab Control</button>
        <button class="action-btn" onclick="transferTab()">Transfer Tab Control</button>
    </div>

    <iframe id="surfly-frame" title="Surfly Session"></iframe>

    <script>
        // Global variable to hold our active session object
        var currentSession = null;

        // 1. Surfly Installation Snippet
        (function(s,u,r,f,l,y){s[f]=s[f]||{init:function(){s[f].q=arguments}};
        l=u.createElement(r);y=u.getElementsByTagName(r)[0];l.async=1;
        l.src='https://surfly.com/surfly.js';y.parentNode.insertBefore(l,y);})
        (window,document,'script','Surfly');

        // 2. Initialize Surfly 
        Surfly.init({
            settings: {
                hidden: true 
            }
        }, function(initResult) {
            if (!initResult.success) {
                console.error("Surfly failed to initialize");
            }
        });

        // 3. Start the session and expose controls
function startSession() {
            var followerLink = document.getElementById('linkInput').value;

            if (!followerLink) {
                alert("Please enter a follower link first.");
                return;
            }

            // 1. Unhide the control buttons immediately
            var controlsDiv = document.getElementById('sessionControls');
            if (controlsDiv) {
                controlsDiv.style.display = 'block';
            } else {
                console.error("Could not find the sessionControls div in the HTML!");
            }

            var sessionOptions = {
                frame_id: "surfly-frame"
            };

            // 2. Try to start the session, and catch any errors
            try {
                currentSession = Surfly.session(sessionOptions, followerLink);
                currentSession.startFollower(null, {});
                console.log("Session started successfully.");
            } catch (error) {
                console.error("Error starting Surfly session:", error);
                alert("There was an error starting the session. Check your browser's developer console for details.");
            }
        }

        // --- NEW API CONTROL FUNCTIONS ---

        function requestHost() {
            if (currentSession) {
                currentSession.requestToHost();
                console.log("Requested to host.");
            }
        }

        function requestTab() {
            if (currentSession) {
                currentSession.requestTabControl();
                console.log("Requested tab control.");
            }
        }

        function revokeTab() {
            if (currentSession) {
                currentSession.revokeTabControl();
                console.log("Revoked tab control.");
            }
        }

        function returnTab() {
            if (currentSession) {
                currentSession.returnTabControl();
                console.log("Returned tab control.");
            }
        }

        function transferTab() {
            if (currentSession) {
                // Note: transferTabControl requires a specific participant's ID.
                // In a production app, you would select a participant from a list of currentSession.participants
                var participantId = prompt("Enter the Participant ID to transfer control to:");
                if (participantId) {
                    currentSession.transferTabControl(parseInt(participantId, 10));
                    console.log("Transferred tab control to " + participantId);
                }
            }
        }
    </script>

</body>
</html>
