<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Surfly Leader Session</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: 0;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    #surfly-iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <h2>Start Surfly Leader Session</h2>

  <button onclick="startSession()">Start Session</button>

  <iframe id="surfly-iframe"></iframe>

  <script>
    var currentSession = null;
    var surflyReady = false;

    (function(s, u, r, f, l, y) {
      s[f] = s[f] || {
        init: function() {
          s[f].q = arguments;
        }
      };
      l = u.createElement(r);
      y = u.getElementsByTagName(r)[0];
      l.async = 1;
      l.src = "https://surfly.com/surfly.js";
      y.parentNode.insertBefore(l, y);
    })(window, document, "script", "Surfly");

    var settings = {
      widget_key: "513065a5492743e6a6340aec09b7e4d1",
      hidden: true
    };

    var metadata = {
      name: "Leader",
      email: "leader@example.com"
    };

    Surfly.init(settings, function(init) {
      if (init.success && !Surfly.isInsideSession) {
        surflyReady = true;
        console.log("Surfly initialized successfully");
      } else {
        console.error("Surfly failed to initialize", init);
      }
    });

    function startSession() {
      if (!surflyReady) {
        alert("Surfly is not ready yet.");
        return;
      }

      if (currentSession) {
        alert("Session already running.");
        return;
      }

      try {
        currentSession = Surfly.session();

        currentSession.on("session_created", function(session) {
          console.log("Follower link:", session.followerLink);
        });

        currentSession.on("participant_joined", function(session) {
          console.log("Participant joined");

          try {
            session.makeHost(1);
            session.transferTabControl(1);
          } catch (error) {
            console.error("Failed to assign host/tab control:", error);
          }
        });

        currentSession.on("session_ended", function() {
          console.log("Session ended");
          currentSession = null;
        });

        currentSession.startLeader("#surfly-iframe", metadata);

      } catch (error) {
        console.error("Failed to start Surfly session:", error);
      }
    }
  </script>
</body>
</html>
