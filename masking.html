<!DOCTYPE html>

    <title>Secure Form Example</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-hover: #2b84c4;
            --bg: #f5f8fa;
            --text: #2d3748;
            --border: #d1d5db;
            --radius: 8px;
        }

        /* ------- Global ------- */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ------- Form Card ------- */
        form {
            background: #ffffff;
            padding: 2rem 3rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            text-align: center;
        }

        /* ------- Groups & Inputs ------- */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }

        .form-group label {
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        .form-group input {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.25);
        }

        /* ------- Two‑column layout for CC + CVV ------- */
        .form-row {
            display: flex;
            gap: 1rem;
        }

        /* ------- Submit Button ------- */
        button[type="submit"] {
            margin-top: 1.25rem;
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            background: var(--primary);
            color: #ffffff;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button[type="submit"]:hover {
            background: var(--primary-hover);
        }
    </style>
