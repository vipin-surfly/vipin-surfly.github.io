<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Mobile WebRTC Test</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        h2,
        h3 {
            margin-top: 0;
        }

        .browser-info {
            word-break: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0 20px;
        }

        button {
            min-height: 44px;
            padding: 10px 16px;
            border: 1px solid #999;
            border-radius: 6px;
            background: #f7f7f7;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #eaeaea;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        video {
            display: block;
            width: 100%;
            min-height: 220px;
            max-height: 480px;
            object-fit: cover;
            background: #000;
            border-radius: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: #f8f8f8;
            font-weight: bold;
        }

        .results {
            margin-top: 10px;
            line-height: 1.6;
            word-break: break-word;
        }

        .result-line {
            margin-bottom: 4px;
        }

        .pass {
            color: green;
        }

        .fail {
            color: red;
        }

        .info {
            color: #005bbb;
        }

        .warning {
            color: #a05a00;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            button {
                flex: 1 1 45%;
            }

            video {
                min-height: 260px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>WebRTC Mobile Test</h2>

    <p id="browser" class="browser-info"></p>

    <div class="button-row">
        <button id="startButton" type="button">
            Start Test
        </button>

        <button id="switchButton" type="button" disabled>
            Switch Camera
        </button>

        <button id="frontButton" type="button" disabled>
            Front Camera
        </button>

        <button id="rearButton" type="button" disabled>
            Rear Camera
        </button>

        <button id="stopButton" type="button" disabled>
            Stop Camera
        </button>
    </div>

    <h3>Camera Preview</h3>

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

    <div id="cameraStatus" class="status">
        Camera not started
    </div>

    <h3 style="margin-top: 25px;">Results</h3>

    <div id="results" class="results"></div>

</div>

<script>
    const videoElement = document.getElementById("video");
    const resultsElement = document.getElementById("results");
    const cameraStatusElement = document.getElementById("cameraStatus");

    const startButton = document.getElementById("startButton");
    const switchButton = document.getElementById("switchButton");
    const frontButton = document.getElementById("frontButton");
    const rearButton = document.getElementById("rearButton");
    const stopButton = document.getElementById("stopButton");

    let currentStream = null;
    let videoDevices = [];
    let currentCameraIndex = 0;
    let currentFacingMode = "user";

    document.getElementById("browser").innerHTML =
        "<strong>User Agent:</strong><br>" + escapeHtml(navigator.userAgent);

    startButton.addEventListener("click", startTest);
    switchButton.addEventListener("click", switchCamera);
    frontButton.addEventListener("click", () => openFacingCamera("user"));
    rearButton.addEventListener("click", () => openFacingCamera("environment"));
    stopButton.addEventListener("click", stopCamera);

    function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = String(value);
        return div.innerHTML;
    }

    function log(message, className = "info") {
        const line = document.createElement("div");
        line.className = "result-line " + className;
        line.textContent = message;
        resultsElement.appendChild(line);
    }

    function setCameraStatus(message) {
        cameraStatusElement.textContent = message;
    }

    function setButtonsForRunningCamera(isRunning) {
        stopButton.disabled = !isRunning;
        frontButton.disabled = !isRunning;
        rearButton.disabled = !isRunning;

        switchButton.disabled =
            !isRunning || videoDevices.length < 2;
    }

    async function startTest() {
        resultsElement.innerHTML = "";

        if (!navigator.mediaDevices ||
            !navigator.mediaDevices.getUserMedia) {

            log(
                "❌ Camera and microphone APIs are not supported.",
                "fail"
            );

            return;
        }

        if (window.RTCPeerConnection) {
            log("✅ RTCPeerConnection supported", "pass");
        } else {
            log("❌ RTCPeerConnection not supported", "fail");
        }

        if (!window.isSecureContext) {
            log(
                "⚠️ This page is not running in a secure context. Use HTTPS or localhost.",
                "warning"
            );
        }

        try {
            await openFacingCamera("user", true);
            await refreshDeviceList();
            await testWebRTC();
        } catch (error) {
            handleMediaError(error);
        }
    }

    async function openFacingCamera(
        facingMode,
        includeAudio = false
    ) {
        stopCurrentTracks();

        setCameraStatus(
            facingMode === "environment"
                ? "Opening rear camera..."
                : "Opening front camera..."
        );

        try {
            currentStream =
                await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: {
                            exact: facingMode
                        }
                    },
                    audio: includeAudio
                });
        } catch (exactError) {
            currentStream =
                await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingMode
                    },
                    audio: includeAudio
                });
        }

        currentFacingMode = facingMode;

        await attachStream(currentStream);

        await refreshDeviceList();

        const activeTrack =
            currentStream.getVideoTracks()[0];

        const settings =
            activeTrack && activeTrack.getSettings
                ? activeTrack.getSettings()
                : {};

        currentCameraIndex = videoDevices.findIndex(
            device =>
                device.deviceId &&
                device.deviceId === settings.deviceId
        );

        if (currentCameraIndex < 0) {
            currentCameraIndex = 0;
        }

        setButtonsForRunningCamera(true);

        const cameraName =
            activeTrack && activeTrack.label
                ? activeTrack.label
                : facingMode === "environment"
                    ? "Rear camera"
                    : "Front camera";

        setCameraStatus("Active camera: " + cameraName);

        log(
            facingMode === "environment"
                ? "✅ Rear camera opened"
                : "✅ Front camera opened",
            "pass"
        );

        if (includeAudio) {
            const hasAudio =
                currentStream.getAudioTracks().length > 0;

            if (hasAudio) {
                log("✅ Microphone access granted", "pass");
            } else {
                log(
                    "⚠️ Camera started, but no microphone track was returned.",
                    "warning"
                );
            }
        }
    }

    async function switchCamera() {
        if (videoDevices.length < 2) {
            log("⚠️ Only one camera was detected.", "warning");
            return;
        }

        currentCameraIndex =
            (currentCameraIndex + 1) % videoDevices.length;

        const selectedDevice =
            videoDevices[currentCameraIndex];

        await openCameraByDeviceId(
            selectedDevice.deviceId,
            selectedDevice.label
        );
    }

    async function openCameraByDeviceId(
        deviceId,
        cameraLabel
    ) {
        stopCurrentTracks();

        setCameraStatus("Switching camera...");

        try {
            currentStream =
                await navigator.mediaDevices.getUserMedia({
                    video: {
                        deviceId: {
                            exact: deviceId
                        }
                    },
                    audio: false
                });

            await attachStream(currentStream);
            await refreshDeviceList();

            const activeTrack =
                currentStream.getVideoTracks()[0];

            const name =
                cameraLabel ||
                activeTrack?.label ||
                "Camera " + (currentCameraIndex + 1);

            setCameraStatus("Active camera: " + name);

            setButtonsForRunningCamera(true);

            log("🔄 Switched to: " + name, "pass");
        } catch (error) {
            handleMediaError(error);
        }
    }

    async function attachStream(stream) {
        videoElement.srcObject = stream;

        try {
            await videoElement.play();
        } catch (error) {
            console.warn(
                "Video autoplay did not start automatically:",
                error
            );
        }
    }

    async function refreshDeviceList() {
        try {
            const devices =
                await navigator.mediaDevices.enumerateDevices();

            videoDevices = devices.filter(
                device => device.kind === "videoinput"
            );

            const microphones = devices.filter(
                device => device.kind === "audioinput"
            );

            const speakers = devices.filter(
                device => device.kind === "audiooutput"
            );

            log(
                "📷 Cameras detected: " + videoDevices.length,
                "info"
            );

            log(
                "🎤 Microphones detected: " + microphones.length,
                "info"
            );

            log(
                "🔊 Audio outputs detected: " + speakers.length,
                "info"
            );

            videoDevices.forEach((device, index) => {
                log(
                    "Camera " +
                    (index + 1) +
                    ": " +
                    (device.label || "Name unavailable"),
                    "info"
                );
            });

            switchButton.disabled =
                !currentStream || videoDevices.length < 2;
        } catch (error) {
            log(
                "⚠️ Could not list media devices: " +
                error.message,
                "warning"
            );
        }
    }

    function stopCamera() {
        stopCurrentTracks();

        videoElement.srcObject = null;

        setCameraStatus("Camera stopped");
        setButtonsForRunningCamera(false);

        log("⏹️ Camera and microphone stopped", "info");
    }

    function stopCurrentTracks() {
        if (!currentStream) {
            return;
        }

        currentStream
            .getTracks()
            .forEach(track => track.stop());

        currentStream = null;
    }

    async function testWebRTC() {
        if (!window.RTCPeerConnection) {
            return;
        }

        let peerConnection;

        try {
            peerConnection = new RTCPeerConnection({
                iceServers: [
                    {
                        urls: "stun:stun.l.google.com:19302"
                    }
                ]
            });

            peerConnection.createDataChannel("test");

            peerConnection.onicecandidate = event => {
                if (!event.candidate) {
                    log(
                        "✅ ICE candidate gathering completed",
                        "pass"
                    );

                    peerConnection.close();
                    return;
                }

                const candidate =
                    event.candidate.candidate || "";

                let candidateType = "unknown";

                if (candidate.includes(" typ host ")) {
                    candidateType = "host";
                } else if (candidate.includes(" typ srflx ")) {
                    candidateType = "server-reflexive";
                } else if (candidate.includes(" typ relay ")) {
                    candidateType = "relay";
                }

                log(
                    "ICE candidate detected: " + candidateType,
                    "info"
                );
            };

            peerConnection.onicecandidateerror = event => {
                log(
                    "⚠️ ICE candidate error: " +
                    (event.errorText || "Unknown error"),
                    "warning"
                );
            };

            const offer =
                await peerConnection.createOffer();

            await peerConnection.setLocalDescription(offer);

            log("✅ WebRTC initialized", "pass");
        } catch (error) {
            if (peerConnection) {
                peerConnection.close();
            }

            log(
                "❌ WebRTC failed: " + error.message,
                "fail"
            );
        }
    }

    function handleMediaError(error) {
        console.error(error);

        setCameraStatus("Camera failed to start");
        setButtonsForRunningCamera(false);

        switch (error.name) {
            case "NotAllowedError":
            case "PermissionDeniedError":
                log(
                    "❌ Camera or microphone permission was denied.",
                    "fail"
                );
                break;

            case "NotFoundError":
            case "DevicesNotFoundError":
                log(
                    "❌ No camera or microphone was found.",
                    "fail"
                );
                break;

            case "NotReadableError":
            case "TrackStartError":
                log(
                    "❌ Could not start the camera. It may already be in use by another application.",
                    "fail"
                );
                break;

            case "OverconstrainedError":
            case "ConstraintNotSatisfiedError":
                log(
                    "❌ The requested camera settings are not supported.",
                    "fail"
                );
                break;

            case "SecurityError":
                log(
                    "❌ Camera access was blocked for security reasons.",
                    "fail"
                );
                break;

            case "AbortError":
                log(
                    "❌ Camera startup was interrupted.",
                    "fail"
                );
                break;

            default:
                log(
                    "❌ " +
                    (error.name || "Camera error") +
                    ": " +
                    (error.message || "Unknown error"),
                    "fail"
                );
        }
    }

    window.addEventListener("beforeunload", stopCurrentTracks);
</script>

</body>
</html>
