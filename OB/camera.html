<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Mobile WebRTC Test</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .browser-info {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin: 15px 0 20px;
        }

        button {
            min-height: 44px;
            padding: 10px 18px;
            border: 1px solid #999;
            border-radius: 6px;
            background: #f7f7f7;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #eaeaea;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        video {
            display: block;
            width: 100%;
            min-height: 220px;
            max-height: 480px;
            object-fit: cover;
            background: #000;
            border-radius: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: #f8f8f8;
            font-weight: bold;
        }

        .results {
            margin-top: 10px;
            line-height: 1.6;
            word-break: break-word;
        }

        .result-line {
            margin-bottom: 4px;
        }

        .pass {
            color: green;
        }

        .fail {
            color: red;
        }

        .info {
            color: #005bbb;
        }

        .warning {
            color: #a05a00;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            button {
                flex: 1;
            }

            video {
                min-height: 260px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>WebRTC Mobile Test</h2>

    <p id="browser" class="browser-info"></p>

    <div class="button-row">
        <button id="startButton" type="button">
            Start Test
        </button>

        <button id="switchButton" type="button" disabled>
            Switch Camera
        </button>
    </div>

    <h3>Camera Preview</h3>

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

    <div id="cameraStatus" class="status">
        Camera not started
    </div>

    <h3 style="margin-top: 25px;">Results</h3>

    <div id="results" class="results"></div>

</div>

<script>
    const videoElement = document.getElementById("video");
    const resultsElement = document.getElementById("results");
    const cameraStatusElement =
        document.getElementById("cameraStatus");

    const startButton =
        document.getElementById("startButton");

    const switchButton =
        document.getElementById("switchButton");

    let currentStream = null;
    let videoDevices = [];
    let currentCameraIndex = 0;

    document.getElementById("browser").innerHTML =
        "<strong>User Agent:</strong><br>" +
        escapeHtml(navigator.userAgent);

    startButton.addEventListener("click", startTest);
    switchButton.addEventListener("click", switchCamera);

    function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = String(value);
        return div.innerHTML;
    }

    function log(message, className = "info") {
        const line = document.createElement("div");

        line.className =
            "result-line " + className;

        line.textContent = message;

        resultsElement.appendChild(line);
    }

    function setCameraStatus(message) {
        cameraStatusElement.textContent = message;
    }

    async function startTest() {
        resultsElement.innerHTML = "";

        if (
            !navigator.mediaDevices ||
            !navigator.mediaDevices.getUserMedia
        ) {
            log(
                "❌ Camera and microphone APIs are not supported.",
                "fail"
            );

            return;
        }

        if (window.RTCPeerConnection) {
            log(
                "✅ RTCPeerConnection supported",
                "pass"
            );
        } else {
            log(
                "❌ RTCPeerConnection not supported",
                "fail"
            );
        }

        if (!window.isSecureContext) {
            log(
                "⚠️ Use HTTPS or localhost for camera access.",
                "warning"
            );
        }

        try {
            stopCurrentStream();

            setCameraStatus("Opening camera...");

            currentStream =
                await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user"
                    },
                    audio: true
                });

            await attachStream(currentStream);
            await refreshDeviceList();
            updateCurrentCameraIndex();

            log(
                "✅ Camera access granted",
                "pass"
            );

            if (
                currentStream.getAudioTracks().length > 0
            ) {
                log(
                    "✅ Microphone access granted",
                    "pass"
                );
            }

            setActiveCameraStatus();

            switchButton.disabled =
                videoDevices.length < 2;

            await testWebRTC();
        } catch (error) {
            handleMediaError(error);
        }
    }

    async function switchCamera() {
        if (videoDevices.length < 2) {
            log(
                "⚠️ Only one camera was detected.",
                "warning"
            );

            return;
        }

        currentCameraIndex =
            (currentCameraIndex + 1) %
            videoDevices.length;

        const selectedDevice =
            videoDevices[currentCameraIndex];

        const audioTrack =
            currentStream?.getAudioTracks()[0] || null;

        stopVideoTracks();

        setCameraStatus("Switching camera...");

        try {
            const newVideoStream =
                await navigator.mediaDevices.getUserMedia({
                    video: {
                        deviceId: {
                            exact: selectedDevice.deviceId
                        }
                    },
                    audio: false
                });

            const combinedStream =
                new MediaStream();

            newVideoStream
                .getVideoTracks()
                .forEach(track => {
                    combinedStream.addTrack(track);
                });

            if (
                audioTrack &&
                audioTrack.readyState === "live"
            ) {
                combinedStream.addTrack(audioTrack);
            }

            currentStream = combinedStream;

            await attachStream(currentStream);
            await refreshDeviceList();
            updateCurrentCameraIndex();
            setActiveCameraStatus();

            log(
                "🔄 Camera switched successfully",
                "pass"
            );
        } catch (error) {
            handleMediaError(error);
        }
    }

    async function attachStream(stream) {
        videoElement.srcObject = stream;

        try {
            await videoElement.play();
        } catch (error) {
            console.warn(
                "Video autoplay did not start:",
                error
            );
        }
    }

    async function refreshDeviceList() {
        const devices =
            await navigator.mediaDevices.enumerateDevices();

        videoDevices = devices.filter(
            device => device.kind === "videoinput"
        );

        const microphones = devices.filter(
            device => device.kind === "audioinput"
        );

        const speakers = devices.filter(
            device => device.kind === "audiooutput"
        );

        log(
            "📷 Cameras detected: " +
            videoDevices.length,
            "info"
        );

        log(
            "🎤 Microphones detected: " +
            microphones.length,
            "info"
        );

        log(
            "🔊 Audio outputs detected: " +
            speakers.length,
            "info"
        );
    }

    function updateCurrentCameraIndex() {
        const videoTrack =
            currentStream?.getVideoTracks()[0];

        if (!videoTrack) {
            return;
        }

        const settings =
            videoTrack.getSettings
                ? videoTrack.getSettings()
                : {};

        const index = videoDevices.findIndex(
            device =>
                device.deviceId === settings.deviceId
        );

        if (index >= 0) {
            currentCameraIndex = index;
        }
    }

    function setActiveCameraStatus() {
        const videoTrack =
            currentStream?.getVideoTracks()[0];

        const name =
            videoTrack?.label ||
            "Active camera";

        setCameraStatus(
            "Active camera: " + name
        );
    }

    function stopVideoTracks() {
        if (!currentStream) {
            return;
        }

        currentStream
            .getVideoTracks()
            .forEach(track => track.stop());
    }

    function stopCurrentStream() {
        if (!currentStream) {
            return;
        }

        currentStream
            .getTracks()
            .forEach(track => track.stop());

        currentStream = null;
    }

    async function testWebRTC() {
        if (!window.RTCPeerConnection) {
            return;
        }

        let peerConnection;

        try {
            peerConnection =
                new RTCPeerConnection({
                    iceServers: [
                        {
                            urls:
                                "stun:stun.l.google.com:19302"
                        }
                    ]
                });

            peerConnection.createDataChannel("test");

            peerConnection.onicecandidate =
                event => {
                    if (!event.candidate) {
                        log(
                            "✅ ICE gathering completed",
                            "pass"
                        );

                        peerConnection.close();
                        return;
                    }

                    const candidate =
                        event.candidate.candidate || "";

                    let type = "unknown";

                    if (
                        candidate.includes(" typ host ")
                    ) {
                        type = "host";
                    } else if (
                        candidate.includes(" typ srflx ")
                    ) {
                        type = "server-reflexive";
                    } else if (
                        candidate.includes(" typ relay ")
                    ) {
                        type = "relay";
                    }

                    log(
                        "ICE candidate: " + type,
                        "info"
                    );
                };

            const offer =
                await peerConnection.createOffer();

            await peerConnection.setLocalDescription(
                offer
            );

            log(
                "✅ WebRTC initialized",
                "pass"
            );
        } catch (error) {
            if (peerConnection) {
                peerConnection.close();
            }

            log(
                "❌ WebRTC failed: " +
                error.message,
                "fail"
            );
        }
    }

    function handleMediaError(error) {
        console.error(error);

        setCameraStatus(
            "Camera failed to start"
        );

        switchButton.disabled = true;

        switch (error.name) {
            case "NotAllowedError":
                log(
                    "❌ Camera or microphone permission was denied.",
                    "fail"
                );
                break;

            case "NotFoundError":
                log(
                    "❌ No camera or microphone was found.",
                    "fail"
                );
                break;

            case "NotReadableError":
                log(
                    "❌ The camera may already be in use by another application.",
                    "fail"
                );
                break;

            case "OverconstrainedError":
                log(
                    "❌ The requested camera is not available.",
                    "fail"
                );
                break;

            default:
                log(
                    "❌ " +
                    (error.name || "Camera error") +
                    ": " +
                    (error.message || "Unknown error"),
                    "fail"
                );
        }
    }

    window.addEventListener(
        "beforeunload",
        stopCurrentStream
    );
</script>

</body>
</html>
