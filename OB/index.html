<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>申し込みフォーム (サンプル)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script>
(function(s,u,r,f,l,y){s[f]=s[f]||{init:function(){s[f].q=arguments}};
l=u.createElement(r);y=u.getElementsByTagName(r)[0];l.async=1;
l.src='https://surfly.com/surfly.js';y.parentNode.insertBefore(l,y);})
(window,document,'script','Surfly');

var settings = {
    // Surfly session options can be set here, or at the Company/Plan levels.
    widget_key: '513065a5492743e6a6340aec09b7e4d1',
};

Surfly.init(settings, function(initResult) {
    if (initResult.success) {
        // API calls can now be made!
        if (!Surfly.isInsideSession) {
            Surfly.button();
        }
    }
    else{
        console.log("Surfly was unable to initialize properly.")
    }
});
</script>
</head>
<body>
  Link
  <a href="http://example.com" surfly-open-externally>Open in the new tab</a>

  Button
  
  <button class="external-link-button">
  Click me
</button>
  <script>document.addEventListener('click', event => {
  const button = event.target.closest('.external-link-button');

  if (!button) return;

  event.preventDefault();

  const a = document.createElement('a');
  a.href = 'https://example.com';
  a.setAttribute('surfly-open-externally', '');
  a.click();
});</script>
</body>
</html>
